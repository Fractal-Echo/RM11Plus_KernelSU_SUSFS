name: 'Build Kernel - RedMagic 11 Pro (NX809J)'

on:
  workflow_dispatch:
    inputs:
      ksu_branch_or_hash:
        description: 'KernelSU-Next branch/commit (empty = auto)'
        required: false
        default: ''
      susfs_commit_hash_or_branch:
        description: 'SUSFS branch/commit (empty = auto)'
        required: false
        default: ''
      build_timestamp:
        description: 'Build timestamp (empty = now)'
        required: false
        default: ''
      optimize_level:
        description: 'Compiler optimization level'
        required: false
        default: 'O2'
        type: choice
        options:
          - O2
          - O3
      clean:
        description: 'Force clean build (no ccache)'
        required: false
        default: false
        type: boolean
      make_release:
        description: 'Publish successful build to GitHub Releases'
        required: false
        default: true
        type: boolean

env:
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 8G
  CCACHE_COMPRESS: '1'

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: 'Build NX809J KSUN SUSFS BBR BBG TTL IPSET Unicode DS NTSync'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ccache bc bison flex libssl-dev libelf-dev libdw-dev python3 python-is-python3 git curl jq zip unzip cpio kmod lz4 zstd
          ccache --set-config=cache_dir=
          ccache --set-config=max_size=8G
          mkdir -p $CCACHE_DIR

      - name: 🧹 Disk Cleanup
        uses: ./.github/actions/disk-cleanup

      - name: Build Kernel NX809J
        uses: ./.github/actions/build-kernel
        env:
          CCACHE_DIR: /home/runner/.ccache
        with:
          op_config_json: '{"model":"OPNX809J","soc":"canoe","branch":"wild/sm8850","manifest":"nx809j_w.xml","android_version":"android16","kernel_version":"6.12","os_version":"OOS16","hmbird":"false","susfs":"true","bbg":"true","bbr":"true","ttl":"true","ip_set":"true","rust_build":"true","lto":"none","uname":"OP-WILD","unicode":"true","c_compiler":"kernel_platform/prebuilts/clang/host/linux-x86/clang-r547379/bin","rust_compiler":"","zyc_compiler":"","bindgen":"","ds":"true","ntsync":"true"}'
          ksu_type: 'KSUN'
          ksu_branch_or_hash: ${{ inputs.ksu_branch_or_hash }}
          susfs_commit_hash_or_branch: ${{ inputs.susfs_commit_hash_or_branch }}
          build_timestamp: ${{ inputs.build_timestamp }}
          optimize_level: ${{ inputs.optimize_level }}
          clean: ${{ inputs.clean }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: kernel-NX809J-KSUN-${{ github.run_number }}
          path: |
            **/*.zip
            **/Image
          retention-days: 7
          if-no-files-found: warn

      - name: Publish GitHub Release
        if: ${{ success() && inputs.make_release == true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: nx809j-build-${{ github.run_number }}
          RELEASE_TITLE: NX809J GitHub Actions Build ${{ github.run_number }}
        shell: bash
        run: |
          set -euo pipefail

          release_dir="$RUNNER_TEMP/nx809j-release"
          mkdir -p "$release_dir"

          mapfile -t kernel_zips < <(find "$GITHUB_WORKSPACE" -path '*/artifacts/AK3_OPNX809J_*.zip' -type f | sort)
          if [ "${#kernel_zips[@]}" -eq 0 ]; then
            echo "::error::No OPNX809J AnyKernel ZIP found under artifacts/"
            exit 1
          fi

          for file in "${kernel_zips[@]}"; do
            cp "$file" "$release_dir/"
          done

          while IFS= read -r file; do
            cp "$file" "$release_dir/"
          done < <(find "$GITHUB_WORKSPACE" -name '*ksu_module*.zip' -type f | sort)

          (cd "$release_dir" && sha256sum * > SHA256SUMS.txt)

          cat > "$release_dir/RELEASE_NOTES.md" <<EOF
          NX809J GitHub Actions build ${{ github.run_number }}.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Commit: ${{ github.sha }}

          Includes:
          - AnyKernel package for OPNX809J / Android 16 / 6.12.23 / KSUN / SuSFS
          - KernelSU module artifacts produced by the build, when present
          - SHA256SUMS.txt

          Warning: this is a freshly rebuilt Actions artifact. Test safely before permanent flash.
          EOF

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$release_dir"/* --clobber
          else
            gh release create "$TAG_NAME" "$release_dir"/* \
              --title "$RELEASE_TITLE" \
              --notes-file "$release_dir/RELEASE_NOTES.md" \
              --latest=false
          fi
